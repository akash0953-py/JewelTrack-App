name: jeweltrack
description: JewelTrack - Jewelry Shop Karigar Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  font_awesome_flutter: ^10.7.0
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  device_info_plus: ^10.1.0
  http: ^1.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.3

  # Image
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Communication
  url_launcher: ^6.3.0
  share_plus: ^9.0.0

  # Backup & Restore
  archive: ^3.6.1
  file_picker: ^8.0.7
  permission_handler: ^11.3.1

  # UI
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_slidable: ^3.1.1
  badges: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.11
  riverpod_generator: 2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png" # Ensure your file is in an 'assets' folder
  adaptive_icon_foreground: "assets/app_icon.png"
